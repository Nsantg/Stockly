name: CI

on:
  push:
    branches:
      - '**'
  pull_request:
    branches:
      - main
  workflow_dispatch: {}

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  unit-and-bdd:
    name: Unit & BDD
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci || (echo "=== npm debug log ===" && cat ~/.npm/_logs/*.log && exit 1)

      - name: Run unit tests
        run: npm test

      - name: Run BDD tests
        run: npm run test:bdd

  integration:
    name: Integration (PostgreSQL)
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: stockly
          POSTGRES_PASSWORD: stockly_secret_2024
          POSTGRES_DB: stockly_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U stockly -d stockly_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      NODE_ENV: test
      TYPEORM_CLI: 'true'
      DATABASE_HOST: localhost
      DATABASE_PORT: 5432
      DATABASE_USER: stockly
      DATABASE_PASSWORD: stockly_secret_2024
      DATABASE_NAME: stockly_test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci || (echo "=== npm debug log ===" && cat ~/.npm/_logs/*.log && exit 1)

      - name: Run integration tests
        run: npm run test:integration
