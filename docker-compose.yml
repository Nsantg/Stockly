version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: stockly_postgres
    environment:
      POSTGRES_USER: ${DATABASE_USER}
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD}
      POSTGRES_DB: ${DATABASE_NAME}
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - stockly_network

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: stockly_pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@stockly.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - '5050:80'
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    depends_on:
      - postgres
    networks:
      - stockly_network

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: stockly_app
    ports:
      - '3000:3000'
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - stockly_network

volumes:
  postgres_data:
  pgadmin_data:

networks:
  stockly_network:
    driver: bridge
